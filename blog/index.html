*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cairo',sans-serif;

background:#f5f7fa;

direction:rtl;

color:#222;

}

header{

background:#0B2A4A;

padding:20px;

color:white;

}

.container{

width:90%;

max-width:1200px;

margin:auto;

}

.logo{

font-size:32px;

font-weight:900;

}

.logo span{

color:#D4AF37;

}

nav{

margin-top:15px;

display:flex;

gap:20px;

flex-wrap:wrap;

}

nav a{

color:white;

text-decoration:none;

font-weight:bold;

}

.hero{

background:white;

padding:50px;

margin:30px 0;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

text-align:center;

}

.hero h1{

font-size:40px;

margin-bottom:15px;

color:#0B2A4A;

}

.hero p{

font-size:20px;

color:#666;

}

.search{

margin-top:30px;

}

.search input{

width:100%;

padding:18px;

border-radius:10px;

border:1px solid #ddd;

font-size:18px;

}

.section-title{

font-size:30px;

margin:40px 0 20px;

color:#0B2A4A;

}

.posts{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}

.post{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.08);

transition:.3s;

}

.post:hover{

transform:translateY(-8px);

}

.post img{

width:100%;

height:220px;

object-fit:cover;

}

.post-content{

padding:20px;

}

.category{

display:inline-block;

background:#D4AF37;

padding:6px 14px;

border-radius:30px;

font-size:14px;

margin-bottom:15px;

}

.post h2{

font-size:24px;

margin-bottom:10px;

}

.post p{

color:#666;

line-height:1.8;

}

.read{

display:inline-block;

margin-top:20px;

background:#0B2A4A;

color:white;

padding:10px 20px;

border-radius:8px;

text-decoration:none;

}

footer{

background:#0B2A4A;

color:white;

text-align:center;

padding:30px;

margin-top:60px;

}

</style>
